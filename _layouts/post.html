---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p>{{ page.subtitle }}</p>{% endif %}
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
    {% if page.category %} · {{ page.category }}{% endif %}
  </header>
  {{ content }}
</article>
